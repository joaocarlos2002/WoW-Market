spring.application.name=wow-market

# ===============================
# DATABASE - PostgreSQL (desabilitado para teste local)
# ===============================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# BLIZZARD API
# ===============================
blizzard.client-id=test-client-id
blizzard.client-secret=test-client-secret
blizzard.region=us
blizzard.api-base-url=https://us.api.blizzard.com
blizzard.auth-base-url=https://oauth.battle.net

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.wowmarket=DEBUG

